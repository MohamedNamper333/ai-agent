# ─────────────────────────────────────────────────────────────
#  AI Agent — Docker Compose
#  Services: app, redis (cache - Phase 4)
#  Usage:
#    Development:  docker-compose up
#    Production:   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Main Application ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-agent:latest
    container_name: ai-agent-app
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8080
      - BACKEND=${BACKEND:-ollama}
      - OLLAMA_BASE=http://host.docker.internal:11434
    volumes:
      # Persistent data — survives container restarts
      - agent-data:/app/data
      - agent-logs:/app/logs
      - agent-models:/app/models
      # Dev: hot-reload (comment out in production)
      - .:/app:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Redis (Cache — Phase 4) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx reverse proxy (Production) ─────────────────────
  # Uncomment in Phase 4 when you add SSL
  # nginx:
  #   image: nginx:alpine
  #   container_name: ai-agent-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - agent-net

volumes:
  agent-data:
    driver: local
  agent-logs:
    driver: local
  agent-models:
    driver: local
  redis-data:
    driver: local

networks:
  agent-net:
    driver: bridge
